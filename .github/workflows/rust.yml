name: Rust CI & Release Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  MACOSX_DEPLOYMENT_TARGET: "11.0"
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg-cache

jobs:
  build-windows:
    name: Build Plugin (Windows)
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Cache vcpkg
      uses: actions/cache@v4
      with:
        path: |
          target/vcpkg
          target/release/build
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('Cargo.toml', 'build.rs') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-

    - name: Cache vcpkg binary cache
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/vcpkg-cache
        key: ${{ runner.os }}-vcpkg-binaries-${{ hashFiles('Cargo.toml', 'build.rs') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-binaries-

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Set up MSVC & CMake
      uses: aseprite/get-ninja@main

    - name: Download Adobe Premiere Pro SDK (Windows)
      shell: bash
      env:
        ADOBE_SDK_URL: ${{ secrets.ADOBE_SDK_URL }}
      run: |
        mkdir -p sdk
        if [ -n "$ADOBE_SDK_URL" ]; then
          echo "Downloading Adobe SDK from secrets..."
          curl -L -o sdk/SDK.zip "$ADOBE_SDK_URL"
          mv sdk/SDK.zip "sdk/Premiere Pro 26.0 C++ SDK Windows.zip"
        else
          echo "No ADOBE_SDK_URL secret provided. Checking if SDK zip is cached or present..."
          if [ ! -f "sdk/Premiere Pro 26.0 C++ SDK Windows.zip" ]; then
            echo "ERROR: Adobe Premiere Pro SDK zip not found! Please set the ADOBE_SDK_URL secret or place the zip in 'sdk/'."
            exit 1
          fi
        fi

    - name: Build plugin in Release Mode
      run: cargo build --release

    - name: Package Release Artifact
      shell: bash
      run: |
        mkdir -p output
        cp target/release/NukeAV1.dll output/NukeAV1.prm
        echo "Artifact prepared at output/NukeAV1.prm"

    - name: Upload Windows Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NukeAV1-Windows-Artifact
        path: output/NukeAV1.prm
        compression-level: 0
        if-no-files-found: error

  build-macos:
    name: Build Plugin (macOS)
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Cache vcpkg
      uses: actions/cache@v4
      with:
        path: |
          target/vcpkg
          target/release/build
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('Cargo.toml', 'build.rs') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-

    - name: Cache vcpkg binary cache
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/vcpkg-cache
        key: ${{ runner.os }}-vcpkg-binaries-${{ hashFiles('Cargo.toml', 'build.rs') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-binaries-

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install System Dependencies (macOS)
      run: |
        brew install cmake ninja nasm

    - name: Download Adobe Premiere Pro SDK (macOS)
      shell: bash
      env:
        ADOBE_SDK_URL: ${{ secrets.ADOBE_SDK_URL }}
      run: |
        mkdir -p sdk
        if [ -n "$ADOBE_SDK_URL" ]; then
          echo "Downloading Adobe SDK from secrets..."
          curl -L -o sdk/SDK.zip "$ADOBE_SDK_URL"
          mv sdk/SDK.zip "sdk/Premiere Pro 26.0 C++ SDK Mac.zip"
        else
          echo "No ADOBE_SDK_URL secret provided. Checking if cached SDK is present..."
          if [ ! -f "sdk/Premiere Pro 26.0 C++ SDK Mac.zip" ] && [ ! -f "sdk/Premiere Pro 26.0 C++ SDK Windows.zip" ]; then
            echo "ERROR: Adobe Premiere Pro SDK zip not found! Please set the ADOBE_SDK_URL secret."
            exit 1
          fi
        fi

    - name: Build plugin in Release Mode (macOS)
      run: cargo build --release

    - name: Parse cargo version
      id: get_version
      shell: bash
      run: |
        VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Package macOS Bundle
      shell: bash
      run: |
        VERSION="${{ steps.get_version.outputs.version }}"
        mkdir -p output/NukeAV1.bundle/Contents/MacOS

        # Copy compiled dynamic library as the bundle executable
        cp target/release/libNukeAV1.dylib output/NukeAV1.bundle/Contents/MacOS/NukeAV1

        # Generate Info.plist dynamically
        cat <<EOF > output/NukeAV1.bundle/Contents/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>English</string>
            <key>CFBundleExecutable</key>
            <string>NukeAV1</string>
            <key>CFBundleIdentifier</key>
            <string>com.anarchbyte.nukeav1</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>NukeAV1</string>
            <key>CFBundlePackageType</key>
            <string>Bndl</string>
            <key>CFBundleSignature</key>
            <string>????</string>
            <key>CFBundleVersion</key>
            <string>$VERSION</string>
        </dict>
        </plist>
        EOF
        echo "macOS Bundle prepared at output/NukeAV1.bundle"

        # Zip the bundle so it uploads as a single file asset
        cd output
        zip -r NukeAV1-macOS.zip NukeAV1.bundle
        echo "Zipped bundle at output/NukeAV1-macOS.zip"

    - name: Upload macOS Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NukeAV1-macOS-Artifact
        path: output/NukeAV1-macOS.zip
        compression-level: 0
        if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    # Only run on tag pushes, after both builds succeed
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ build-windows, build-macos ]
    
    # КЛЮЧОВЕ ВИПРАВЛЕННЯ: Надаємо екшену права на створення релізу
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Parse version from tag
      id: get_version
      run: |
        VERSION="${GITHUB_REF#refs/tags/v}"
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: NukeAV1-Windows-Artifact
        path: release-assets/windows

    - name: Download macOS artifact
      uses: actions/download-artifact@v4
      with:
        name: NukeAV1-macOS-Artifact
        path: release-assets/macos

    - name: Rename assets for release
      run: |
        VERSION="${{ steps.get_version.outputs.version }}"
        mv release-assets/windows/NukeAV1.prm        release-assets/NukeAV1-${VERSION}-Windows.prm
        mv release-assets/macos/NukeAV1-macOS.zip    release-assets/NukeAV1-${VERSION}-macOS.zip

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: "NukeAV1 ${{ steps.get_version.outputs.version }}"
        tag_name: ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          release-assets/NukeAV1-${{ steps.get_version.outputs.version }}-Windows.prm
          release-assets/NukeAV1-${{ steps.get_version.outputs.version }}-macOS.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
